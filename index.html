<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>7月区域业绩PK榜</title>
  <style>
    :root {
      --bg-1: #071021;
      --bg-2: #101634;
      --bg-3: #1a1040;
      --panel: rgba(8, 18, 36, 0.8);
      --panel-strong: rgba(11, 24, 46, 0.92);
      --line: rgba(142, 183, 255, 0.18);
      --text: #eff6ff;
      --muted: #96a7c7;
      --soft: #bcc8dc;
      --green: #4ade80;
      --yellow: #facc15;
      --blue: #60a5fa;
      --gold: #f6c65b;
      --danger: #ff7b7b;
      --card-shadow: 0 22px 48px rgba(2, 8, 23, 0.38);
      --header-gradient: linear-gradient(135deg, #4ade80, #facc15);
      --pill-gradient: linear-gradient(180deg, #2d3a1f, #1f2a14);
      --stage-bg: #f5ebd9;
      --stage-text: #4d3920;
      --glass: linear-gradient(180deg, rgba(14, 31, 59, 0.88), rgba(9, 18, 34, 0.94));
      --font-main: "Avenir Next", "Trebuchet MS", "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: var(--font-main);
      color: var(--text);
      background:
        radial-gradient(circle at 20% 18%, rgba(74, 222, 128, 0.12), transparent 24%),
        radial-gradient(circle at 84% 12%, rgba(250, 204, 21, 0.1), transparent 20%),
        radial-gradient(circle at 70% 80%, rgba(88, 93, 255, 0.14), transparent 28%),
        linear-gradient(160deg, var(--bg-1), var(--bg-2) 48%, var(--bg-3));
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      background:
        linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.5), transparent 92%);
    }

    body::after {
      background:
        radial-gradient(circle at 14% 24%, rgba(96, 165, 250, 0.22), transparent 16%),
        radial-gradient(circle at 80% 36%, rgba(74, 222, 128, 0.14), transparent 18%),
        radial-gradient(circle at 60% 12%, rgba(250, 204, 21, 0.08), transparent 10%);
      filter: blur(26px);
      opacity: 0.9;
    }

    @keyframes driftGlow {
      0%, 100% {
        transform: translate3d(0, 0, 0) scale(1);
        opacity: 0.42;
      }
      50% {
        transform: translate3d(-10px, 10px, 0) scale(1.08);
        opacity: 0.88;
      }
    }

    @keyframes shimmerSweep {
      0% {
        transform: translateX(-170%) rotate(16deg);
      }
      100% {
        transform: translateX(280%) rotate(16deg);
      }
    }

    @keyframes iconPulse {
      0%, 100% {
        transform: translateY(0) scale(1);
        opacity: 0.8;
      }
      50% {
        transform: translateY(-5px) scale(1.06);
        opacity: 1;
      }
    }

    @keyframes crownHaloDrift {
      0%, 100% {
        transform: translate3d(-8%, 0, 0) scaleX(0.94);
        opacity: 0.34;
      }
      50% {
        transform: translate3d(8%, 0, 0) scaleX(1.03);
        opacity: 0.72;
      }
    }

    @keyframes crownLightSweep {
      0% {
        transform: translateX(-200%) skewX(-18deg);
        opacity: 0;
      }
      18% {
        opacity: 0.78;
      }
      52% {
        opacity: 0.36;
      }
      100% {
        transform: translateX(320%) skewX(-18deg);
        opacity: 0;
      }
    }

    @keyframes treeBob {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-4px);
      }
    }

    @keyframes stageParticles {
      0% {
        transform: translate3d(0, 16px, 0) scale(1);
        opacity: 0;
      }
      18% {
        opacity: 0.55;
      }
      100% {
        transform: translate3d(0, -24px, 0) scale(1.06);
        opacity: 0;
      }
    }

    @keyframes badgePulse {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(250, 204, 21, 0.12);
      }
      50% {
        box-shadow: 0 0 0 10px rgba(250, 204, 21, 0);
      }
    }

    @keyframes fireworksBurst {
      0% {
        transform: translate3d(0, 0, 0) scale(0.2);
        opacity: 0;
      }
      18% {
        opacity: 1;
      }
      100% {
        transform: translate3d(var(--tx), var(--ty), 0) scale(5.8);
        opacity: 0;
      }
    }

    @keyframes confettiFall {
      0% {
        transform: translate3d(0, -10px, 0) rotate(0deg);
        opacity: 0;
      }
      12% {
        opacity: 1;
      }
      100% {
        transform: translate3d(var(--drift), 360px, 0) rotate(540deg);
        opacity: 0;
      }
    }

    @keyframes veinFlow {
      0% {
        background-position: 0% 0%, 0% 0%, 0% 0%;
        opacity: 0.42;
      }
      50% {
        background-position: 24% 12%, -12% 18%, 18% -14%;
        opacity: 0.72;
      }
      100% {
        background-position: 48% 24%, -24% 36%, 36% -28%;
        opacity: 0.42;
      }
    }

    @keyframes kingAura {
      0%, 100% {
        transform: translate3d(0, 0, 0) scale(1);
        opacity: 0.62;
      }
      50% {
        transform: translate3d(-8px, 6px, 0) scale(1.06);
        opacity: 0.92;
      }
    }

    .page-shell {
      position: relative;
      width: min(1880px, calc(100% - 20px));
      margin: 0 auto;
      padding: 28px 0 42px;
      z-index: 1;
    }

    .board-header {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(148, 163, 184, 0.14);
      border-radius: 28px;
      padding: 28px;
      background: linear-gradient(180deg, rgba(11, 21, 43, 0.9), rgba(7, 13, 28, 0.96));
      box-shadow: var(--card-shadow);
      backdrop-filter: blur(10px);
    }

    .header-copy {
      max-width: 980px;
      margin: 0;
      text-align: left;
    }

    .board-header::before {
      content: "";
      position: absolute;
      inset: auto -16% 18% auto;
      width: 360px;
      height: 360px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(74, 222, 128, 0.18), transparent 68%);
      filter: blur(24px);
      pointer-events: none;
    }

    .header-topline {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      margin: 0;
      border-radius: 999px;
      color: #d6fbe1;
      letter-spacing: 0.22em;
      font-size: 13px;
      text-transform: none;
      background: rgba(33, 57, 101, 0.55);
      border: 1px solid rgba(110, 231, 183, 0.18);
      box-shadow: inset 0 0 0 1px rgba(15, 23, 42, 0.35);
    }

    .header-title {
      margin: 18px 0 10px;
      font-size: clamp(34px, 5vw, 60px);
      font-weight: 800;
      line-height: 1.04;
      letter-spacing: 0.02em;
      background: var(--header-gradient);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 24px rgba(122, 240, 138, 0.12);
    }

    .header-subtitle {
      color: #c8f0d0;
      font-size: clamp(13px, 2vw, 18px);
      letter-spacing: 0.38em;
      margin-bottom: 10px;
    }

    .header-date {
      color: rgba(226, 232, 240, 0.72);
      font-size: 14px;
      letter-spacing: 0.05em;
      margin-top: 10px;
    }

    .top-overview {
      display: grid;
      grid-template-columns: minmax(0, 1.9fr) minmax(320px, 1fr);
      gap: 16px;
      margin-top: 24px;
      align-items: stretch;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) minmax(0, 1fr);
      gap: 16px;
      margin-top: 0;
    }

    .summary-cluster {
      padding: 16px 18px;
    }

    .summary-cluster-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0;
      min-height: 100%;
      align-items: stretch;
    }

    .cluster-item {
      min-width: 0;
      padding: 4px 12px 4px 0;
    }

    .cluster-item + .cluster-item {
      padding-left: 14px;
      border-left: 1px solid rgba(255, 255, 255, 0.08);
    }

    .cluster-label {
      color: rgba(226, 232, 240, 0.72);
      font-size: 13px;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
      white-space: nowrap;
    }

    .cluster-value {
      font-size: clamp(24px, 2.4vw, 34px);
      font-weight: 900;
      line-height: 1;
      color: #f8fbff;
    }

    .cluster-value small {
      font-size: 15px;
      color: rgba(226, 232, 240, 0.72);
      font-weight: 700;
      margin-left: 4px;
    }

    .board-section {
      position: relative;
      margin-top: 24px;
      padding: 18px 20px 16px;
      border-radius: 22px;
      border: 1px solid rgba(92, 121, 168, 0.18);
      background:
        linear-gradient(180deg, rgba(10, 18, 33, 0.82), rgba(8, 14, 27, 0.94)),
        radial-gradient(circle at 14% 50%, rgba(96, 165, 250, 0.1), transparent 24%);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }

    .board-section::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 4px;
      border-radius: 22px 0 0 22px;
      background: linear-gradient(180deg, #4ade80, #facc15);
      opacity: 0.85;
    }

    .board-section .header-topline {
      display: block;
      padding: 0;
      margin: 0 0 10px;
      border: none;
      border-radius: 0;
      background: none;
      box-shadow: none;
      color: #e7f6ee;
      font-size: clamp(20px, 2vw, 28px);
      font-weight: 900;
      letter-spacing: 0.08em;
      text-shadow: 0 0 18px rgba(74, 222, 128, 0.12);
    }

    .tree-hall {
      position: relative;
      margin-top: 0;
      padding: 14px 16px 14px;
      border-radius: 22px;
      border: 1px solid rgba(140, 118, 63, 0.26);
      background:
        radial-gradient(circle at 16% 18%, rgba(250, 204, 21, 0.12), transparent 22%),
        linear-gradient(180deg, rgba(28, 22, 14, 0.98), rgba(18, 15, 11, 0.98));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.03),
        0 16px 40px rgba(0, 0, 0, 0.18);
      overflow: hidden;
    }

    .tree-hall::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(255, 216, 105, 0.08), transparent 16%, transparent 84%, rgba(128, 91, 30, 0.08)),
        linear-gradient(180deg, rgba(255, 245, 214, 0.04), transparent 24%, transparent 72%, rgba(250, 204, 21, 0.04));
      pointer-events: none;
    }

    .tree-hall-title {
      position: relative;
      font-size: 16px;
      font-weight: 900;
      color: #fff2c6;
      letter-spacing: 0.04em;
    }

    .tree-hall-list {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
      margin-top: 8px;
    }

    .tree-hall-chip {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 12px;
      width: fit-content;
      max-width: 100%;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(52, 39, 20, 0.92);
      border: 1px solid rgba(221, 182, 92, 0.24);
      color: #fff3d0;
      font-size: 11px;
      font-weight: 800;
      line-height: 1.2;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .tree-hall-chip.current {
      background: linear-gradient(135deg, rgba(89, 63, 17, 0.98), rgba(53, 84, 46, 0.98));
      border-color: rgba(250, 204, 21, 0.36);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.05),
        0 0 0 1px rgba(250, 204, 21, 0.08);
    }

    .tree-hall-chip-head {
      display: inline-flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px 8px;
      min-width: 0;
    }

    .tree-hall-chip-name {
      font-size: 13px;
      font-weight: 900;
      color: #fff2c6;
      letter-spacing: 0.04em;
    }

    .tree-hall-chip-kicker {
      font-size: 10px;
      font-weight: 800;
      color: rgba(255, 237, 185, 0.9);
      padding: 3px 7px;
      border-radius: 999px;
      background: rgba(255, 214, 102, 0.12);
      border: 1px solid rgba(255, 214, 102, 0.16);
    }

    .tree-hall-metrics,
    .tree-hall-metrics.current {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 4px 0;
      min-width: 0;
    }

    .tree-hall-metric {
      display: inline-flex;
      align-items: baseline;
      gap: 4px;
      min-width: 0;
      padding: 0 10px;
      white-space: nowrap;
    }

    .tree-hall-metric + .tree-hall-metric {
      border-left: 1px solid rgba(255, 238, 194, 0.16);
    }

    .tree-hall-metric-label {
      color: rgba(243, 232, 202, 0.72);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .tree-hall-metric-value {
      color: #fff4d7;
      font-size: 15px;
      font-weight: 900;
      line-height: 1;
    }

    .tree-hall-metric-unit {
      color: rgba(243, 232, 202, 0.72);
      font-size: 10px;
      font-weight: 700;
      line-height: 1;
    }

    .tree-hall-empty {
      color: rgba(233, 227, 205, 0.66);
      font-size: 13px;
      line-height: 1.7;
    }

    .tree-hall-inline {
      position: relative;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      color: #fff2c6;
    }

    .tree-hall-inline-label {
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 0.06em;
    }

    .summary-card {
      position: relative;
      overflow: hidden;
      border-radius: 22px;
      padding: 18px 18px 16px;
      background: linear-gradient(180deg, rgba(17, 34, 64, 0.95), rgba(12, 23, 41, 0.9));
      border: 1px solid rgba(116, 145, 196, 0.18);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
      min-height: 124px;
    }

    .summary-card::before {
      content: "";
      position: absolute;
      top: -54px;
      right: -18px;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(96, 165, 250, 0.16), transparent 70%);
      filter: blur(8px);
      animation: driftGlow 9s ease-in-out infinite;
    }

    .summary-card::after {
      content: "";
      position: absolute;
      inset: -35% auto -35% -18%;
      width: 88px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.16), transparent);
      opacity: 0.28;
      pointer-events: none;
      animation: shimmerSweep 12s linear infinite;
    }

    .summary-label {
      position: relative;
      color: rgba(226, 232, 240, 0.72);
      font-size: 14px;
      letter-spacing: 0.06em;
      margin-bottom: 12px;
    }

    .summary-value {
      position: relative;
      font-size: clamp(26px, 3vw, 38px);
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0.02em;
    }

    .summary-value small {
      font-size: 15px;
      color: rgba(226, 232, 240, 0.72);
      font-weight: 600;
      margin-left: 6px;
    }

    .summary-note {
      position: relative;
      color: var(--soft);
      margin-top: 10px;
      font-size: 13px;
    }

    .summary-icon {
      position: absolute;
      top: 14px;
      right: 16px;
      font-size: 28px;
      line-height: 1;
      filter: drop-shadow(0 6px 12px rgba(15, 23, 42, 0.28));
      animation: iconPulse 5.6s ease-in-out infinite;
      pointer-events: none;
    }

    .summary-card.is-leader {
      border-color: rgba(250, 204, 21, 0.34);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.04),
        0 0 0 1px rgba(250, 204, 21, 0.08);
    }

    .summary-card.is-leader .summary-icon {
      color: #ffe178;
    }

    .summary-card.tree-king {
      background:
        linear-gradient(155deg, rgba(7, 40, 45, 0.98), rgba(12, 58, 54, 0.96) 46%, rgba(28, 39, 22, 0.98));
      border-color: rgba(250, 204, 21, 0.34);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.05),
        0 0 0 1px rgba(250, 204, 21, 0.12),
        0 18px 36px rgba(2, 10, 16, 0.24);
    }

    .summary-card.tree-king::before {
      top: -40px;
      right: -10px;
      width: 180px;
      height: 180px;
      background: radial-gradient(circle, rgba(250, 204, 21, 0.18), rgba(110, 231, 183, 0.08), transparent 72%);
      filter: blur(10px);
      animation: kingAura 8s ease-in-out infinite;
    }

    .summary-card.tree-king::after {
      inset: 0;
      width: auto;
      background:
        linear-gradient(130deg, transparent 10%, rgba(255, 227, 144, 0.08) 16%, transparent 20%, transparent 58%, rgba(115, 198, 146, 0.08) 64%, transparent 68%),
        linear-gradient(58deg, transparent 0 41%, rgba(239, 199, 82, 0.11) 43%, transparent 45%),
        linear-gradient(118deg, transparent 0 55%, rgba(175, 233, 198, 0.08) 57%, transparent 59%);
      opacity: 0.58;
      animation: veinFlow 12s linear infinite;
      pointer-events: none;
    }

    .summary-card.tree-king .summary-label {
      display: none;
    }

    .summary-card.tree-king .summary-value {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 0;
      font-size: clamp(20px, 2.6vw, 34px);
      color: #fff7d9;
    }

    .summary-card.tree-king .summary-note {
      color: rgba(234, 243, 230, 0.78);
      line-height: 1.65;
    }

    .summary-card.tree-king .summary-icon {
      color: #f9dd79;
      text-shadow: 0 0 22px rgba(250, 204, 21, 0.18);
    }

    .tree-king-prefix {
      display: block;
      font-size: 18px;
      line-height: 1.3;
      margin-top: 0;
      font-weight: 900;
      letter-spacing: 0.08em;
      color: #e3f9eb;
    }

    .tree-king-name {
      font-size: clamp(24px, 2.6vw, 36px);
      font-weight: 900;
      line-height: 1.08;
      letter-spacing: 0.03em;
      color: #fff6d8;
      text-shadow: 0 0 22px rgba(250, 204, 21, 0.12);
    }

    .summary-grid .summary-card:nth-child(2)::before,
    .summary-grid .summary-card:nth-child(2) .summary-icon {
      animation-delay: 0.7s;
    }


    .board-legend {
      max-width: none;
      margin: 10px 0 0;
      color: rgba(221, 232, 248, 0.76);
      font-size: 13px;
      letter-spacing: 0.04em;
      text-align: left;
      line-height: 1.7;
    }

    .tree-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      margin-top: 22px;
    }

    .tree-card {
      position: relative;
      overflow: hidden;
      border-radius: 28px;
      padding: 22px;
      background: var(--glass);
      border: 1px solid rgba(133, 157, 194, 0.16);
      box-shadow: var(--card-shadow);
      min-height: 530px;
      isolation: isolate;
    }

    .tree-card.is-achieved {
      cursor: pointer;
      border-color: rgba(250, 204, 21, 0.28);
      box-shadow:
        var(--card-shadow),
        0 0 0 1px rgba(250, 204, 21, 0.08);
    }

    .tree-card.is-achieved:hover .tree-stage {
      border-color: rgba(250, 204, 21, 0.24);
      box-shadow: inset 0 0 0 1px rgba(250, 204, 21, 0.05);
    }

    .tree-card.is-king {
      padding-top: 22px;
      padding-right: 22px;
      overflow: visible;
      border-color: rgba(250, 204, 21, 0.28);
      box-shadow:
        var(--card-shadow),
        0 0 0 1px rgba(250, 204, 21, 0.1);
    }

    .tree-card.is-king .stat-pill {
      padding-right: 18px;
    }

    .tree-card-body {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .tree-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 14% 16%, rgba(255, 255, 255, 0.05), transparent 18%),
        radial-gradient(circle at 84% 18%, var(--accent-fade), transparent 24%);
      opacity: 0.88;
      z-index: -1;
    }

    .tree-card::after {
      content: "";
      position: absolute;
      inset: auto -18% -24% auto;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--accent-fade), transparent 72%);
      filter: blur(24px);
      opacity: 0.76;
      z-index: -1;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .region-headline {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .region-name {
      font-size: clamp(22px, 2vw, 30px);
      font-weight: 800;
      letter-spacing: 0.05em;
    }

    .region-note {
      margin-top: 6px;
      color: rgba(222, 233, 247, 0.72);
      font-size: 13px;
      letter-spacing: 0.12em;
    }

    .tree-caption {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-top: 2px;
      text-align: center;
    }

    .tree-caption-name {
      font-size: clamp(20px, 1.65vw, 25px);
      font-weight: 900;

  <script>
    (() => {
      const PUBLIC_VIEW = true;
      const REMOTE_DATA_URL = "./board-data.json";
      const REMOTE_REFRESH_MS = 15000;
      const STORAGE_KEY = "july-regional-pk-board-state-v1";
      const TREE_HALL_KEY = "july-tree-king-hall-v1";
      const weekdayMap = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
      const accents = ["#4ade80", "#facc15", "#38bdf8", "#fb7185"];
      const defaultState = {
        reportDate: "2026-07-09",
        updatedAt: "2026-07-09T09:00:00+08:00",
        regions: [
          { name: "南方大区", target: 120000, achieved: 607, accent: accents[0] },
          { name: "果次方", target: 129600, achieved: 13680, accent: accents[1] },
          { name: "华北大区", target: 120000, achieved: 2490, accent: accents[2] },
          { name: "东北大区", target: 85000, achieved: 7200, accent: accents[3] }
        ],
        treeHallEntries: [
          {
            name: "果次方",
            appearanceCount: 1,
            durationMs: 3 * 86400000,
            currentStreakMs: 3 * 86400000,
            crownedAt: new Date(2026, 6, 7).getTime(),
            current: true
          },
          {
            name: "东北大区",
            appearanceCount: 1,
            durationMs: 6 * 86400000,
            currentStreakMs: 0,
            crownedAt: new Date(2026, 6, 1).getTime(),
            current: false
          }
        ]
      };

      const headerDate = document.getElementById("headerDate");
      const summaryGrid = document.getElementById("summaryGrid");
      const treeHall = document.getElementById("treeHall");
      const treeGrid = document.getElementById("treeGrid");
      const adminToggle = document.getElementById("adminToggle");
      const celebrationModal = document.getElementById("celebrationModal");
      const celebrationEffects = document.getElementById("celebrationEffects");
      const celebrationTitle = document.getElementById("celebrationTitle");
      const celebrationCopy = document.getElementById("celebrationCopy");
      const celebrationClose = document.getElementById("celebrationClose");
      const celebrationReplay = document.getElementById("celebrationReplay");
      const celebrationConfirm = document.getElementById("celebrationConfirm");
      const adminModal = document.getElementById("adminModal");
      const closeModal = document.getElementById("closeModal");
      const adminForm = document.getElementById("adminForm");
      const resetData = document.getElementById("resetData");

      let boardState = loadState();
      let displayAchieved = boardState.regions.map(() => 0);
      let animationFrameId = 0;
      let celebrationRegionName = "";
      let celebrationAudioContext = null;
      let treeHallState = loadTreeHallState(getMonthKey(boardState.reportDate), Date.now());
      let remoteDataSignature = "";

      syncForm(boardState);
      syncTreeHallState(Date.now(), boardState);
      animateTo(boardState.regions.map(region => region.achieved), 1700);
      refreshRemoteState();

      const treeHallTimer = window.setInterval(() => {
        syncTreeHallState(Date.now(), boardState);
        renderTreeHallModule(getLeaderNameFromState(boardState.regions));
      }, 1000);
      const remoteRefreshTimer = window.setInterval(() => {
        refreshRemoteState();
      }, REMOTE_REFRESH_MS);

      adminToggle.addEventListener("click", () => {
        syncForm(boardState);
        adminModal.hidden = false;
        document.body.style.overflow = "hidden";
      });

      closeModal.addEventListener("click", closeAdminModal);
      adminModal.addEventListener("click", (event) => {
        if (event.target === adminModal) {
          closeAdminModal();
        }
      });

      adminForm.addEventListener("submit", (event) => {
        event.preventDefault();
        const now = Date.now();
        syncTreeHallState(now, boardState);
        const nextState = collectFormState();
        nextState.updatedAt = new Date().toISOString();
        boardState = nextState;
        saveState(boardState);
        syncTreeHallState(now, boardState);
        closeAdminModal();
        animateTo(boardState.regions.map(region => region.achieved), 1400);
      });

      resetData.addEventListener("click", () => {
        const now = Date.now();
        syncTreeHallState(now, boardState);
        boardState = clone(defaultState);
        treeHallState = applyTreeHallPreset(createEmptyTreeHallState(getMonthKey(boardState.reportDate), now));
        boardState.updatedAt = new Date().toISOString();
        saveState(boardState);
        saveTreeHallState();
        syncTreeHallState(now, boardState);
        syncForm(boardState);
        closeAdminModal();
        animateTo(boardState.regions.map(region => region.achieved), 1600);
      });

      treeGrid.addEventListener("click", (event) => {
        const card = event.target.closest("[data-celebrate='1']");
        if (!card) {
          return;
        }
        openCelebration(card.dataset.regionName || "");
      });

      celebrationClose.addEventListener("click", closeCelebration);
      celebrationConfirm.addEventListener("click", closeCelebration);
      celebrationReplay.addEventListener("click", () => {
        if (!celebrationRegionName) {
          return;
        }
        launchCelebrationEffects();
        playCelebrationSound();
      });

      celebrationModal.addEventListener("click", (event) => {
        if (event.target === celebrationModal) {
          closeCelebration();
        }
      });

      document.addEventListener("visibilitychange", () => {
        syncTreeHallState(Date.now(), boardState);
      });

      window.addEventListener("pagehide", () => {
        syncTreeHallState(Date.now(), boardState);
        window.clearInterval(treeHallTimer);
        window.clearInterval(remoteRefreshTimer);
      });

      function closeAdminModal() {
        adminModal.hidden = true;
        document.body.style.overflow = "";
      }

      function openCelebration(regionName) {
        celebrationRegionName = regionName;
        celebrationTitle.textContent = `恭喜 ${regionName} 完成业绩目标`;
        celebrationCopy.textContent = `${regionName} 已达成阶段目标，现场喝彩、烟花和彩带一起送上，继续冲刺更高业绩。`;
        celebrationModal.hidden = false;
        document.body.style.overflow = "hidden";
        launchCelebrationEffects();
        playCelebrationSound();
      }

      function closeCelebration() {
        celebrationModal.hidden = true;
        celebrationEffects.innerHTML = "";
        celebrationRegionName = "";
        document.body.style.overflow = "";
      }

      function launchCelebrationEffects() {
        celebrationEffects.innerHTML = "";
        const burstClasses = ["", "alt", "cool"];
        for (let index = 0; index < 10; index += 1) {
          const burst = document.createElement("span");
          burst.className = `celebration-burst ${burstClasses[index % burstClasses.length]}`.trim();
          burst.style.left = `${12 + Math.random() * 76}%`;
          burst.style.top = `${14 + Math.random() * 42}%`;
          burst.style.setProperty("--tx", `${(Math.random() - 0.5) * 90}px`);
          burst.style.setProperty("--ty", `${-70 - Math.random() * 120}px`);
          burst.style.animationDelay = `${index * 0.08}s`;
          celebrationEffects.appendChild(burst);
        }

        const confettiColors = ["#facc15", "#4ade80", "#60a5fa", "#fb7185", "#f97316", "#fef3c7"];
        for (let index = 0; index < 42; index += 1) {
          const piece = document.createElement("span");
          piece.className = "confetti-piece";
          piece.style.left = `${Math.random() * 100}%`;
          piece.style.top = `${-8 - Math.random() * 12}%`;
          piece.style.background = confettiColors[index % confettiColors.length];
          piece.style.setProperty("--drift", `${(Math.random() - 0.5) * 180}px`);
          piece.style.animationDelay = `${Math.random() * 0.4}s`;
          piece.style.transform = `rotate(${Math.random() * 240}deg)`;
          celebrationEffects.appendChild(piece);
        }
      }

      function playCelebrationSound() {
        const AudioContextRef = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextRef) {
          return;
        }
        if (!celebrationAudioContext) {
          celebrationAudioContext = new AudioContextRef();
        }
        if (celebrationAudioContext.state === "suspended") {
          celebrationAudioContext.resume();
        }
        const ctx = celebrationAudioContext;
        const now = ctx.currentTime;
        const master = ctx.createGain();
        master.gain.setValueAtTime(0.0001, now);
        master.gain.exponentialRampToValueAtTime(0.15, now + 0.04);
        master.gain.exponentialRampToValueAtTime(0.0001, now + 2.8);
        master.connect(ctx.destination);

        [523.25, 659.25, 783.99, 1046.5].forEach((freq, index) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = index % 2 === 0 ? "triangle" : "sine";
          osc.frequency.setValueAtTime(freq, now + index * 0.18);
          gain.gain.setValueAtTime(0.0001, now + index * 0.18);
          gain.gain.exponentialRampToValueAtTime(0.2, now + index * 0.18 + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + index * 0.18 + 0.42);
          osc.connect(gain);
          gain.connect(master);
          osc.start(now + index * 0.18);
          osc.stop(now + index * 0.18 + 0.46);
        });

        const cheer = ctx.createBufferSource();
        const duration = 1.6;
        const buffer = ctx.createBuffer(1, ctx.sampleRate * duration, ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let index = 0; index < data.length; index += 1) {
          const envelope = 1 - index / data.length;
          data[index] = (Math.random() * 2 - 1) * envelope * 0.18;
        }
        cheer.buffer = buffer;
        const cheerFilter = ctx.createBiquadFilter();
        cheerFilter.type = "bandpass";
        cheerFilter.frequency.setValueAtTime(900, now);
        cheerFilter.Q.value = 0.8;
        const cheerGain = ctx.createGain();
        cheerGain.gain.setValueAtTime(0.0001, now + 0.12);
        cheerGain.gain.exponentialRampToValueAtTime(0.05, now + 0.26);
        cheerGain.gain.exponentialRampToValueAtTime(0.0001, now + 1.9);
        cheer.connect(cheerFilter);
        cheerFilter.connect(cheerGain);
        cheerGain.connect(master);
        cheer.start(now + 0.12);
        cheer.stop(now + 1.95);
      }

      function loadState() {
        return clone(defaultState);
      }

      function saveState(state) {
        return state;
      }

      function createEmptyTreeHallState(monthKey, now) {
        return {
          monthKey,
          currentLeader: "",
          lastTimestamp: now,
          entries: {}
        };
      }

      function getTreeHallPreset(monthKey) {
        if (monthKey !== "2026-07") {
          return null;
        }
        return {
          entries: {
            "东北大区": {
              durationMs: 6 * 86400000,
              crownedAt: new Date(2026, 6, 1).getTime()
            }
          }
        };
      }

      function applyTreeHallPreset(state) {
        const preset = getTreeHallPreset(state.monthKey);
        if (!preset) {
          return state;
        }

        Object.entries(preset.entries).forEach(([name, presetEntry]) => {
          const existing = state.entries[name];
          state.entries[name] = {
            durationMs: Math.max(existing?.durationMs || 0, presetEntry.durationMs),
            crownedAt: existing ? Math.min(existing.crownedAt, presetEntry.crownedAt) : presetEntry.crownedAt
          };
        });

        return state;
      }

      function loadTreeHallState(monthKey, now) {
        return applyTreeHallPreset(createEmptyTreeHallState(monthKey, now));
      }

      function normalizeRemoteTreeHallEntries(entries, now) {
        if (!Array.isArray(entries)) {
          return {};
        }
        return Object.fromEntries(
          entries
            .filter((entry) => entry && typeof entry === "object" && typeof entry.name === "string" && entry.name)
            .map((entry, index) => [
              entry.name,
              {
                durationMs: Number.isFinite(Number(entry.durationMs)) ? Math.max(0, Number(entry.durationMs)) : 0,
                crownedAt: Number.isFinite(Number(entry.crownedAt)) ? Number(entry.crownedAt) : now + index,
                appearanceCount: Number.isFinite(Number(entry.appearanceCount)) ? Math.max(0, Number(entry.appearanceCount)) : 0,
                currentStreakMs: Number.isFinite(Number(entry.currentStreakMs)) ? Math.max(0, Number(entry.currentStreakMs)) : 0,
                current: Boolean(entry.current)
              }
            ])
        );
      }

      function normalizeTreeHallEntries(entries, now) {
        if (!entries || typeof entries !== "object") {
          return {};
        }
        return Object.fromEntries(Object.entries(entries).map(([name, entry]) => {
          const normalized = entry && typeof entry === "object" ? entry : {};
          return [name, {
            durationMs: Number.isFinite(Number(normalized.durationMs)) ? Math.max(0, Number(normalized.durationMs)) : 0,
            crownedAt: Number.isFinite(Number(normalized.crownedAt)) ? Number(normalized.crownedAt) : now
          }];
        }));
      }

      function saveTreeHallState() {}

      function ensureTreeHallEntry(regionName, now) {
        if (!regionName) {
          return;
        }
        if (!treeHallState.entries[regionName]) {
          treeHallState.entries[regionName] = {
            durationMs: 0,
            crownedAt: now,
            appearanceCount: 0,
            currentStreakMs: 0,
            current: false
          };
        }
      }

      function getMonthKey(reportDate) {
        const date = new Date(`${reportDate || ""}T00:00:00`);
        if (Number.isNaN(date.getTime())) {
          const fallback = new Date();
          return `${fallback.getFullYear()}-${String(fallback.getMonth() + 1).padStart(2, "0")}`;
        }
        return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}`;
      }

      function getLeaderNameFromState(regions) {
        const sorted = [...regions].sort((left, right) => {
          if (right.achieved !== left.achieved) {
            return right.achieved - left.achieved;
          }
          return (right.target ? right.achieved / right.target : 0) - (left.target ? left.achieved / left.target : 0);
        });
        return sorted[0]?.name || "";
      }

      function syncTreeHallState(now, sourceState) {
        const monthKey = getMonthKey(sourceState.reportDate);
        const leaderName = getLeaderNameFromState(sourceState.regions);
        if (PUBLIC_VIEW) {
          const remoteEntries = normalizeRemoteTreeHallEntries(sourceState.treeHallEntries, now);
          treeHallState = applyTreeHallPreset(createEmptyTreeHallState(monthKey, now));
          treeHallState.entries = {
            ...treeHallState.entries,
            ...remoteEntries
          };
          ensureTreeHallEntry(leaderName, now);
          treeHallState.currentLeader = leaderName;
          treeHallState.lastTimestamp = now;
          return;
        }
        if (treeHallState.monthKey !== monthKey) {
          treeHallState = applyTreeHallPreset(createEmptyTreeHallState(monthKey, now));
        }
        if (!leaderName) {
          treeHallState.lastTimestamp = now;
          saveTreeHallState();
          return;
        }

        if (!treeHallState.currentLeader) {
          ensureTreeHallEntry(leaderName, now);
          treeHallState.currentLeader = leaderName;
          treeHallState.lastTimestamp = now;
          saveTreeHallState();
          return;
        }

        ensureTreeHallEntry(treeHallState.currentLeader, now);
        treeHallState.entries[treeHallState.currentLeader].durationMs += Math.max(0, now - (treeHallState.lastTimestamp || now));
        ensureTreeHallEntry(leaderName, now);
        treeHallState.currentLeader = leaderName;
        treeHallState.lastTimestamp = now;
        saveTreeHallState();
      }

      function normalizeState(input) {
        const fallback = clone(defaultState);
        if (!input || !Array.isArray(input.regions)) {
          return fallback;
        }

        const regions = fallback.regions.map((region, index) => {
          const incoming = input.regions[index] || {};
          return {
            name: region.name,
            target: sanitizeNumber(incoming.target, region.target, 1),
            achieved: sanitizeNumber(incoming.achieved, region.achieved, 0),
            accent: region.accent
          };
        });

        return {
          reportDate: typeof input.reportDate === "string" && input.reportDate ? input.reportDate : fallback.reportDate,
          updatedAt: typeof input.updatedAt === "string" && input.updatedAt ? input.updatedAt : fallback.updatedAt,
          regions,
          treeHallEntries: Array.isArray(input.treeHallEntries) ? input.treeHallEntries : []
        };
      }

      async function refreshRemoteState() {
        try {
          const response = await fetch(`${REMOTE_DATA_URL}?t=${Date.now()}`, { cache: "no-store" });
          if (!response.ok) {
            return;
          }
          const remoteState = normalizeState(await response.json());
          const nextSignature = JSON.stringify(remoteState);
          if (nextSignature === remoteDataSignature) {
            return;
          }
          remoteDataSignature = nextSignature;
          const valuesChanged = JSON.stringify(remoteState.regions.map(region => [region.target, region.achieved])) !== JSON.stringify(boardState.regions.map(region => [region.target, region.achieved]));
          boardState = remoteState;
          syncForm(boardState);
          syncTreeHallState(Date.now(), boardState);
          if (valuesChanged) {
            animateTo(boardState.regions.map(region => region.achieved), 1200);
          } else {
            render();
          }
        } catch (error) {
          console.warn("Remote data refresh skipped:", error);
        }
      }

      function sanitizeNumber(value, fallback, min) {
        const number = Number(value);
        if (!Number.isFinite(number)) {
          return fallback;
        }
        return Math.max(min, Math.round(number));
      }

      function syncForm(state) {
        document.getElementById("reportDate").value = state.reportDate;
        state.regions.forEach((region, index) => {
          document.getElementById(`target-${index}`).value = region.target;
          document.getElementById(`achieved-${index}`).value = region.achieved;
        });
      }

      function collectFormState() {
        return {
          reportDate: document.getElementById("reportDate").value || defaultState.reportDate,
          updatedAt: new Date().toISOString(),
          regions: boardState.regions.map((region, index) => ({
            name: region.name,
            target: sanitizeNumber(document.getElementById(`target-${index}`).value, region.target, 1),
            achieved: sanitizeNumber(document.getElementById(`achieved-${index}`).value, region.achieved, 0),
            accent: region.accent
          }))
        };
      }

      function animateTo(targetValues, duration) {
        cancelAnimationFrame(animationFrameId);
        const from = [...displayAchieved];
        const to = targetValues.map(value => Math.max(0, Number(value) || 0));
        const start = performance.now();

        const step = (now) => {
          const progress = clamp((now - start) / duration, 0, 1);
          const eased = 1 - Math.pow(1 - progress, 3);
          displayAchieved = from.map((value, index) => value + (to[index] - value) * eased);
          render();
          if (progress < 1) {
            animationFrameId = requestAnimationFrame(step);
          } else {
            displayAchieved = [...to];
            render();
          }
        };

        animationFrameId = requestAnimationFrame(step);
      }

      function buildMetric(region, index, achievedDisplay, maxTarget) {
        const safeAchieved = Math.max(0, achievedDisplay);
        return {
          ...region,
          index,
          achievedDisplay: safeAchieved,
          rate: region.target > 0 ? (safeAchieved / region.target) * 100 : 0,
          targetScale: region.target / maxTarget
        };
      }

      function sortMetrics(metrics) {
        return [...metrics].sort((left, right) => {
          if (right.rate !== left.rate) {
            return right.rate - left.rate;
          }
          return right.achievedDisplay - left.achievedDisplay;
        });
      }

      function sortMetricsByAchieved(metrics) {
        return [...metrics].sort((left, right) => {
          if (right.achievedDisplay !== left.achievedDisplay) {
            return right.achievedDisplay - left.achievedDisplay;
          }
          return right.rate - left.rate;
        });
      }

      function render() {
        const maxTarget = Math.max(...boardState.regions.map(region => region.target));
        const liveMetrics = boardState.regions.map((region, index) => {
          return buildMetric(region, index, displayAchieved[index] || 0, maxTarget);
        });
        const activeMetrics = [...liveMetrics];
        const liveRanked = sortMetrics(liveMetrics);
        const liveAmountRanked = sortMetricsByAchieved(liveMetrics);
        const orderedMetrics = activeMetrics.map((metric, index) => ({
          ...metric,
          slotIndex: index + 1
        }));
        const totalTarget = activeMetrics.reduce((sum, item) => sum + item.target, 0);
        const totalAchieved = activeMetrics.reduce((sum, item) => sum + item.achievedDisplay, 0);
        const reachedCount = activeMetrics.filter(item => item.achievedDisplay >= item.target).length;
        const leaderByAmount = liveAmountRanked[0];

        headerDate.textContent = `数据更新时间 ${formatDateTime(boardState.updatedAt)}`;

        summaryGrid.innerHTML = [

            "注解：业绩第一，执掌树王铭牌，席位随业绩达成情况实时轮换。",
            "👑",
            "is-leader tree-king"
          )
        ].join("");

        renderTreeHallModule(leaderByAmount.name);
        treeGrid.innerHTML = orderedMetrics.map((region) => {
          return renderRegionCard(region, region.slotIndex, maxTarget, leaderByAmount.name);
        }).join("");
      }

      function createSummaryClusterCard(totalTarget, totalAchieved, reachedCount) {
        return `
          <article class="summary-card summary-cluster">
            <div class="summary-cluster-grid">
              <div class="cluster-item">
                <div class="cluster-label">7月总目标</div>
                <div class="cluster-value">${formatCurrency(totalTarget)}<small>元</small></div>
              </div>
              <div class="cluster-item">
                <div class="cluster-label">7月已达成</div>
                <div class="cluster-value">${formatCurrency(totalAchieved)}<small>元</small></div>
              </div>
              <div class="cluster-item">
                <div class="cluster-label">达标区域数</div>
                <div class="cluster-value">${reachedCount}<small>/ 4区</small></div>
              </div>
            </div>
          </article>
        `;
      }

      function renderTreeHallModule(currentLeaderName) {
        const entries = Object.entries(treeHallState.entries)
          .sort((left, right) => {
            if (left[1].current !== right[1].current) {
              return left[1].current ? -1 : 1;
            }
            if ((right[1].appearanceCount || 0) !== (left[1].appearanceCount || 0)) {
              return (right[1].appearanceCount || 0) - (left[1].appearanceCount || 0);
            }
            if (right[1].durationMs !== left[1].durationMs) {
              return right[1].durationMs - left[1].durationMs;
            }
            return left[1].crownedAt - right[1].crownedAt;
          });
        const chips = entries.length
          ? entries.map(([name, entry]) => {
              const isCurrent = entry.current || name === currentLeaderName;
              const currentClass = isCurrent ? " current" : "";
              const kicker = isCurrent ? `<span class="tree-hall-chip-kicker">实时树王</span>` : "";
              const metricsClass = isCurrent ? "tree-hall-metrics current" : "tree-hall-metrics";
              const commonMetrics = `
                <span class="tree-hall-metric">
                  <span class="tree-hall-metric-label">登榜</span>

                <span class="tree-hall-metric">

                  <span class="tree-hall-metric-value">${formatDays(entry.durationMs)}</span>

              const streakMetric = isCurrent ? `

              return `
                <div class="tree-hall-chip${currentClass}">
                  <div class="tree-hall-chip-head">

                    ${kicker}
                  </div>

                    ${commonMetrics}

            }).join("")
          : `<div class="tree-hall-empty">本月实时树王：暂无，首位登顶大区出现后将自动永久入碑。</div>`;

        treeHall.innerHTML = `
          <div class="tree-hall-title">📜古树功勋榜｜本月上榜区域</div>
          <div class="tree-hall-list">${chips}</div>
        `;
      }

      function createSummaryCard(label, value, note, icon = "✦", cardClass = "") {
        return `
          <article class="summary-card ${cardClass}">
            <div class="summary-icon">${icon}</div>
            <div class="summary-label">${label}</div>
            <div class="summary-value">${value}</div>
            <div class="summary-note">${note}</div>
          </article>
        `;
      }

      function getGrowthStage(rate) {
        const label = getStageName(rate);
        if (rate <= 0) {
          return { label, className: "stage-seed" };
        }
        if (rate <= 10) {
          return { label, className: "stage-sprout" };
        }
        if (rate <= 30) {
          return { label, className: "stage-grow" };
        }
        if (rate <= 70) {
          return { label, className: "stage-bud" };
        }
        if (rate <= 90) {
          return { label, className: "stage-bloom" };
        }
        if (rate < 100) {
          return { label, className: "stage-fruit" };
        }
        return { label, className: "stage-harvest" };
      }

      function renderRegionCard(region, rank, maxTarget, leaderName) {
        const rateClass = region.rate >= 100 ? "rate-green" : region.rate >= 80 ? "rate-gold" : "rate-blue";

            ${isAmountLeader ? `

                  </g>
                  <g transform="translate(73 6)">

                    <path d="M26 34c0-12 10-20 21-20s21 8 21 20-9 23-21 23-21-11-21-23Z" fill="url(#treeKingGreen)" stroke="rgba(255,246,199,0.38)" stroke-width="2" />
                    <path d="M47 26c-5 7-8 16-9 27" stroke="url(#treeKingGold)" stroke-width="5" stroke-linecap="round" />

                    <circle cx="35" cy="31" r="5" fill="#f1d789" opacity="0.78" />

                <div class="champion-crown-icon">

            <div class="tree-card-body">

                </div>

              <div class="tree-caption">

                ${isAchieved ? `
                  <div class="tree-caption-badges">
                    <div class="celebrate-chip">🎉 点击庆祝</div>
                  </div>
                ` : ""}
              </div>
            </div>
          </article>

      }

      function renderTreeGraphic(region, rank, maxTarget) {
        const progress = clamp(region.rate, 0, 9999);
        const capped = clamp(progress, 0, 100);
        const baseUnits = region.target / 10000;
        const extraUnits = Math.floor(Math.max(0, region.achievedDisplay - region.target) / 10000);
        const seed = seededNumber(region.name) + rank * 0.09;

        const centerX = 160;
        const groundY = 304;
        const targetScale = region.target / maxTarget;
        const finalHeight = 168 + Math.pow(targetScale, 0.78) * 122;
        const currentHeight = finalHeight * (capped / 100);
        const trunkWidth = 8 + smoothStep(28, 60, capped) * 12 + targetScale * 3.2;
        const sway = (seed - 0.5) * 22;
        const topX = centerX + sway;
        const canopyFactor = smoothStep(35, 60, capped);
        const leafFactor = smoothStep(11, 60, capped);
        const branchFactor = smoothStep(21, 50, capped);
        const budCoverage = capped < 61 ? 0 : baseUnits * (0.08 + 0.92 * smoothStep(61, 70, capped));
        const bloomCoverage = capped < 71 ? 0 : capped <= 80
          ? baseUnits * (0.45 * smoothStep(71, 80, capped))
          : capped <= 90
            ? baseUnits * (0.45 + 0.55 * smoothStep(81, 90, capped))
            : baseUnits;
        const fruitCoverage = capped < 91 ? 0 : baseUnits * smoothStep(91, 100, capped);
        const fruitGrowth = capped < 91 ? 0 : smoothStep(91, 100, capped);
        const spreadX = 58 + targetScale * 28 + canopyFactor * 26;
        const spreadY = 42 + targetScale * 18 + canopyFactor * 20;
        const crownBaseY = groundY - currentHeight * (0.54 + canopyFactor * 0.07);
        const canopyTopGuide = crownBaseY - spreadY * 0.78;
        const trunkNaturalTopY = groundY - currentHeight * (0.68 + leafFactor * 0.05 + canopyFactor * 0.02);
        const trunkInset = 12 + trunkWidth * 0.42 + canopyFactor * 6;
        const topY = Math.max(trunkNaturalTopY, canopyTopGuide + trunkInset);
        const branchClipTop = topY - 4;
        const branchClipBottom = crownBaseY + spreadY * (0.58 + canopyFactor * 0.18);
        const branchClipCy = (branchClipTop + branchClipBottom) / 2;
        const branchClipRy = Math.max(14, (branchClipBottom - branchClipTop) / 2);
        const branchClipRx = Math.max(18, spreadX * (0.28 + branchFactor * 0.24 + leafFactor * 0.32));
        const accentGlow = hexToRgba(region.accent, 0.3);
        const treeId = `tree-${Math.abs(hashCode(region.name))}`;

        const canopyNodes = [
          { x: -0.80, y: 0.18, r: 0.98, start: 31 },
          { x: -0.58, y: 0.02, r: 0.92, start: 26 },
          { x: -0.36, y: -0.12, r: 0.88, start: 28 },
          { x: -0.12, y: -0.22, r: 0.84, start: 30 },
          { x: 0.12, y: -0.22, r: 0.88, start: 31 },
          { x: 0.38, y: -0.10, r: 0.92, start: 29 },
          { x: 0.63, y: 0.06, r: 0.96, start: 32 },
          { x: 0.82, y: 0.22, r: 0.92, start: 34 },
          { x: -0.62, y: 0.34, r: 0.96, start: 36 },
          { x: -0.26, y: 0.24, r: 0.90, start: 34 },
          { x: 0.05, y: 0.20, r: 0.96, start: 35 },
          { x: 0.34, y: 0.28, r: 0.92, start: 36 },
          { x: 0.58, y: 0.40, r: 0.84, start: 38 }
        ];

        const branchDefs = [
          { ratio: 0.22, dir: -1, scale: 1.00, start: 22 },
          { ratio: 0.30, dir: 1, scale: 0.94, start: 26 },
          { ratio: 0.40, dir: -1, scale: 0.92, start: 29 },
          { ratio: 0.48, dir: 1, scale: 0.86, start: 32 },
          { ratio: 0.58, dir: -1, scale: 0.82, start: 35 },
          { ratio: 0.66, dir: 1, scale: 0.78, start: 38 },
          { ratio: 0.74, dir: -1, scale: 0.68, start: 42 },
          { ratio: 0.82, dir: 1, scale: 0.60, start: 46 }
        ];

        const branchClipShapes = canopyNodes.map((node) => {
          const visibility = smoothStep(node.start, node.start + 16, capped) * Math.max(leafFactor, branchFactor * 0.72);
          if (visibility <= 0.02) {
            return "";
          }
          const cx = topX + node.x * spreadX;
          const cy = crownBaseY + node.y * spreadY;
          const radius = (16 + node.r * 14) * visibility * (0.64 + canopyFactor * 0.42);
          return `<circle cx="${cx}" cy="${cy}" r="${radius}"></circle>`;
        }).join("");

        const baseSlotCount = Math.ceil(baseUnits);
        const slotPositions = generateBloomPositions(baseSlotCount + extraUnits, spreadX * 0.86, spreadY * 0.76, seed)
          .map(slot => ({
            ...slot,
            x: topX + slot.x,
            y: crownBaseY + slot.y
          }));
        const baseSlots = buildWeightedSlots(baseUnits, slotPositions.slice(0, baseSlotCount));
        const extraSlots = slotPositions.slice(baseSlotCount, baseSlotCount + extraUnits);
        let branchOverlay = "";

        let content = `
          <svg viewBox="0 0 320 360" role="img" aria-label="${region.name}业绩树">
            <defs>
              <linearGradient id="${treeId}-trunk" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#8a5a2f" />
                <stop offset="100%" stop-color="#4f2e15" />
              </linearGradient>
              <linearGradient id="${treeId}-leaf" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#7cf08b" />
                <stop offset="100%" stop-color="#2f9750" />
              </linearGradient>
              <radialGradient id="${treeId}-flower" cx="50%" cy="45%" r="58%">
                <stop offset="0%" stop-color="#fff7bf" />
                <stop offset="58%" stop-color="#ffd6ed" />
                <stop offset="100%" stop-color="#ff86bc" />
              </radialGradient>
              <radialGradient id="${treeId}-apple" cx="36%" cy="34%" r="68%">
                <stop offset="0%" stop-color="#ffe1c9" />
                <stop offset="20%" stop-color="#ffb55f" />
                <stop offset="100%" stop-color="#d7292e" />
              </radialGradient>
              <clipPath id="${treeId}-branch-clip">
                <ellipse cx="${topX}" cy="${branchClipCy}" rx="${branchClipRx}" ry="${branchClipRy}"></ellipse>
                ${branchClipShapes}
              </clipPath>
            </defs>

            <circle cx="${centerX}" cy="96" r="88" fill="${accentGlow}" opacity="0.36"></circle>
            <ellipse cx="${centerX}" cy="307" rx="92" ry="16" fill="rgba(13, 25, 50, 0.72)"></ellipse>
            <ellipse cx="${centerX}" cy="312" rx="82" ry="14" fill="rgba(22, 49, 35, 0.78)"></ellipse>
            <ellipse cx="${centerX}" cy="314" rx="64" ry="10" fill="rgba(67, 95, 43, 0.46)"></ellipse>
        `;

        if (capped <= 0) {
          content += `
            <ellipse cx="${centerX}" cy="302" rx="14" ry="9" fill="#8c6334"></ellipse>
            <ellipse cx="${centerX}" cy="300" rx="8" ry="5" fill="#b37b3b"></ellipse>
          `;
        } else if (capped < 21) {
          const stemHeight = 18 + currentHeight * 0.78 + smoothStep(11, 20, capped) * 28;
          const sproutY = groundY - stemHeight;
          const sproutWidth = 3.5 + smoothStep(11, 20, capped) * 2.5;
          const leafOpen = smoothStep(1, 20, capped);
          const leafTilt = 8 + leafOpen * 18;
          content += `
            <path d="M ${centerX} ${groundY} C ${centerX - 2} ${groundY - stemHeight * 0.32}, ${centerX + 3} ${groundY - stemHeight * 0.68}, ${centerX} ${sproutY}"
              fill="none" stroke="#65db85" stroke-width="${sproutWidth}" stroke-linecap="round"></path>
            <ellipse cx="${centerX - 8}" cy="${sproutY + 8}" rx="${3 + leafOpen * 8}" ry="${2 + leafOpen * 5}"
              transform="rotate(${-34 - leafTilt} ${centerX - 8} ${sproutY + 8})" fill="#88ef9d" opacity="${0.4 + leafOpen * 0.5}"></ellipse>
            <ellipse cx="${centerX + 9}" cy="${sproutY + 7}" rx="${3 + leafOpen * 8.2}" ry="${2 + leafOpen * 4.8}"
              transform="rotate(${34 + leafTilt} ${centerX + 9} ${sproutY + 7})" fill="#6cde80" opacity="${0.35 + leafOpen * 0.55}"></ellipse>
            <ellipse cx="${centerX}" cy="302" rx="11" ry="7" fill="#8c6334"></ellipse>
          `;
        } else {
          const trunkPath = [
            `M ${centerX} ${groundY}`,
            `C ${centerX + sway * 0.18} ${groundY - currentHeight * 0.28},`,
            `${centerX + sway * 0.62} ${groundY - currentHeight * 0.72},`,
            `${topX} ${topY}`
          ].join(" ");

          content += `
            <path d="${trunkPath}" fill="none" stroke="url(#${treeId}-trunk)" stroke-width="${trunkWidth}" stroke-linecap="round"></path>
            <path d="${trunkPath}" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="${trunkWidth * 0.18}" stroke-linecap="round"></path>
          `;

          content += `<g clip-path="url(#${treeId}-branch-clip)">`;
          branchDefs.forEach((branch) => {
            const visibility = smoothStep(branch.start, branch.start + 12, capped) * branchFactor;
            if (visibility <= 0.02) {
              return;
            }
            const y = groundY - currentHeight * branch.ratio;
            const x = centerX + sway * branch.ratio * 0.88;
            const length = (34 + targetScale * 20 + branch.scale * 8) * visibility;
            const rawEndY = y - (10 + length * 0.24);
            const branchCeilingY = crownBaseY - spreadY * (0.6 + branch.scale * 0.12);
            const endY = Math.max(rawEndY, branchCeilingY);
            const normalizedDy = clamp((endY - crownBaseY) / (spreadY * 0.96), -0.98, 0.98);
            const canopyHalfWidth = spreadX * 0.9 * Math.sqrt(Math.max(0.08, 1 - normalizedDy * normalizedDy));
            const desiredEndX = x + branch.dir * length;
            const endX = clamp(desiredEndX, topX - canopyHalfWidth, topX + canopyHalfWidth);
            const branchWidth = 2 + trunkWidth * (0.18 + branch.scale * 0.08) * visibility;
            const twigCeilingY = crownBaseY - spreadY * (0.54 + branch.scale * 0.08);
            const twigY = Math.max(endY - (7 + branch.scale * 3.2) * visibility, twigCeilingY);
            const twigNormalizedDy = clamp((twigY - crownBaseY) / (spreadY * 0.96), -0.98, 0.98);
            const twigHalfWidth = spreadX * 0.84 * Math.sqrt(Math.max(0.08, 1 - twigNormalizedDy * twigNormalizedDy));
            const twigTargetX = endX + branch.dir * (10 + branch.scale * 5) * visibility;
            const twigX = clamp(twigTargetX, topX - twigHalfWidth, topX + twigHalfWidth);
            const spurY = Math.max(endY - (4 + branch.scale * 2.1) * visibility, twigCeilingY + 1.8);
            const spurNormalizedDy = clamp((spurY - crownBaseY) / (spreadY * 0.96), -0.98, 0.98);
            const spurHalfWidth = spreadX * 0.76 * Math.sqrt(Math.max(0.08, 1 - spurNormalizedDy * spurNormalizedDy));
            const spurTargetX = endX - branch.dir * (5 + branch.scale * 2.2) * visibility;
            const spurX = clamp(spurTargetX, topX - spurHalfWidth, topX + spurHalfWidth);
            const controlX = x + (endX - x) * 0.42;
            const controlY = Math.max(y - 10 - length * 0.06, crownBaseY - spreadY * 0.64);
            const overlayWidth = Math.max(1.6, branchWidth * 0.46);
            content += `
              <path d="M ${x} ${y} Q ${controlX} ${controlY}, ${endX} ${endY}"
                fill="none" stroke="#6a3d1d" stroke-width="${branchWidth}" stroke-linecap="round"></path>
              <path d="M ${endX - branch.dir * 6} ${endY + 4} Q ${endX} ${endY}, ${twigX} ${twigY}"
                fill="none" stroke="#6a3d1d" stroke-width="${Math.max(1.4, branchWidth * 0.5)}" stroke-linecap="round"></path>
            `;
            branchOverlay += `
              <g opacity="${0.48 + visibility * 0.34}">
                <path d="M ${endX - branch.dir * 5} ${endY + 3} Q ${endX} ${endY}, ${twigX} ${twigY}"
                  fill="none" stroke="rgba(124, 78, 36, 0.96)" stroke-width="${overlayWidth}" stroke-linecap="round"></path>
                <path d="M ${endX - branch.dir * 2.6} ${endY + 1.8} Q ${endX} ${endY}, ${spurX} ${spurY}"
                  fill="none" stroke="rgba(135, 85, 38, 0.88)" stroke-width="${Math.max(1.1, overlayWidth * 0.72)}" stroke-linecap="round"></path>
                <circle cx="${endX}" cy="${endY}" r="${Math.max(1.3, overlayWidth * 0.52)}" fill="rgba(117, 72, 31, 0.96)"></circle>
                <circle cx="${endX - branch.dir * 0.6}" cy="${endY - 0.7}" r="${Math.max(0.75, overlayWidth * 0.18)}" fill="rgba(255, 228, 186, 0.34)"></circle>
              </g>
            `;
          });
          content += `</g>`;

          canopyNodes.forEach((node, index) => {
            const visibility = smoothStep(node.start, node.start + 16, capped) * leafFactor;
            if (visibility <= 0.03) {
              return;
            }
            const cx = topX + node.x * spreadX;
            const cy = crownBaseY + node.y * spreadY;
            const radius = (16 + node.r * 14) * visibility * (0.68 + canopyFactor * 0.5);
            const opacity = 0.16 + visibility * 0.76;
            const hue = index % 2 === 0 ? "#7af08b" : "#49c46d";
            content += `
              <circle cx="${cx}" cy="${cy}" r="${radius}" fill="${hue}" opacity="${opacity}"></circle>
              <circle cx="${cx - radius * 0.22}" cy="${cy - radius * 0.24}" r="${radius * 0.42}" fill="rgba(255,255,255,0.12)" opacity="${opacity * 0.55}"></circle>
            `;
          });

          if (branchOverlay) {
            content += `<g clip-path="url(#${treeId}-branch-clip)">${branchOverlay}</g>`;
          }
        }

        if (capped > 60) {
          const drawableBaseSlots = [...baseSlots].sort((left, right) => left.y - right.y);
          drawableBaseSlots.forEach((slot) => {
            const totalFill = slotProgress(baseUnits, slot);
            if (totalFill <= 0) {
              return;
            }

            if (capped <= 70) {
              const budFill = slotProgress(budCoverage, slot);
              if (budFill > 0) {
                content += drawBud(slot, budFill);
              }
              return;
            }

            if (capped <= 90) {
              const flowerFill = slotProgress(bloomCoverage, slot);
              const budFill = Math.max(0, totalFill - flowerFill);
              if (budFill > 0.01) {
                content += drawBud(slot, budFill);
              }
              if (flowerFill > 0.01) {
                content += drawFlower(slot, flowerFill, treeId);
              }
              return;
            }

            const fruitFill = slotProgress(fruitCoverage, slot);
            const flowerFill = Math.max(0, totalFill - fruitFill);
            if (flowerFill > 0.01) {
              content += drawFlower(slot, flowerFill * (1 - fruitGrowth * 0.28), treeId);
            }
            if (fruitFill > 0.01) {
              content += drawApple(slot, fruitFill, treeId, fruitGrowth >= 1);
            }
          });
        }

        if (progress >= 100 && baseSlots.length) {
          const renderedExtraSlots = extraSlots.slice(0, extraUnits).sort((left, right) => left.y - right.y);
          renderedExtraSlots.forEach((slot, index) => {
            content += drawApple({
              x: slot.x,
              y: slot.y,
              scale: slot.scale * (index % 2 === 0 ? 1.02 : 0.94),
              weight: 1
            }, 1, treeId, true);
          });
        }

        content += "</svg>";
        return content;
      }

      function drawBud(slot, amount) {
        const scale = slot.scale * (0.72 + amount * 0.42) * (0.84 + slot.weight * 0.18);
        const rx = 3.4 * scale;
        const ry = 5.2 * scale;
        return `
          <g opacity="${0.22 + amount * 0.78}">
            <ellipse cx="${slot.x}" cy="${slot.y}" rx="${rx}" ry="${ry}" fill="#ffd690"></ellipse>
            <ellipse cx="${slot.x}" cy="${slot.y - ry * 0.1}" rx="${rx * 0.7}" ry="${ry * 0.72}" fill="#ffb3cc"></ellipse>
            <path d="M ${slot.x} ${slot.y + ry * 0.9} Q ${slot.x - rx * 0.4} ${slot.y + ry * 0.36}, ${slot.x} ${slot.y - ry * 0.08}"
              fill="none" stroke="#6ed480" stroke-width="${0.9 + scale * 0.8}" stroke-linecap="round"></path>
          </g>
        `;
      }

      function drawFlower(slot, amount, treeId) {
        const open = clamp(amount, 0.12, 1);
        const base = slot.scale * (0.9 + slot.weight * 0.14);
        const distance = (2 + open * 4.6) * base;
        const petal = (1.9 + open * 2.8) * base;
        const center = 1.5 + open * 1.8;
        const opacity = 0.24 + amount * 0.78;
        return `
          <g opacity="${opacity}">
            <circle cx="${slot.x}" cy="${slot.y - distance}" r="${petal}" fill="url(#${treeId}-flower)"></circle>
            <circle cx="${slot.x + distance}" cy="${slot.y}" r="${petal}" fill="url(#${treeId}-flower)"></circle>
            <circle cx="${slot.x}" cy="${slot.y + distance}" r="${petal}" fill="url(#${treeId}-flower)"></circle>
            <circle cx="${slot.x - distance}" cy="${slot.y}" r="${petal}" fill="url(#${treeId}-flower)"></circle>
            <circle cx="${slot.x + distance * 0.7}" cy="${slot.y - distance * 0.7}" r="${petal * 0.92}" fill="url(#${treeId}-flower)"></circle>
            <circle cx="${slot.x}" cy="${slot.y}" r="${center * base}" fill="#f4c31e"></circle>
          </g>
        `;
      }

      function drawApple(slot, amount, treeId, ripe) {
        const growth = ripe ? 1 : clamp(amount, 0.12, 1);
        const size = (4.2 + growth * 6.4) * slot.scale * (0.88 + slot.weight * 0.16);
        const fruitColor = ripe ? `url(#${treeId}-apple)` : mixColor("#7ed96b", "#ff5346", growth);
        const fruitFill = ripe ? `url(#${treeId}-apple)` : fruitColor;
        const highlight = ripe ? "#ffe7be" : "rgba(255,255,255,0.18)";
        return `
          <g opacity="${0.26 + growth * 0.74}">
            <path d="M ${slot.x} ${slot.y - size * 0.9} Q ${slot.x + size * 0.1} ${slot.y - size * 1.3}, ${slot.x + size * 0.3} ${slot.y - size * 1.56}"
              fill="none" stroke="#6c3b1d" stroke-width="${1.1 + size * 0.08}" stroke-linecap="round"></path>
            <ellipse cx="${slot.x + size * 0.52}" cy="${slot.y - size * 1.22}" rx="${size * 0.34}" ry="${size * 0.18}"
              transform="rotate(-26 ${slot.x + size * 0.52} ${slot.y - size * 1.22})" fill="#7fd86f"></ellipse>
            <circle cx="${slot.x}" cy="${slot.y}" r="${size}" fill="${fruitFill}"></circle>
            <circle cx="${slot.x - size * 0.34}" cy="${slot.y - size * 0.34}" r="${size * 0.28}" fill="${highlight}" opacity="0.74"></circle>
          </g>
        `;
      }

      function buildWeightedSlots(baseUnits, positions) {
        const whole = Math.floor(baseUnits);
        const fraction = baseUnits - whole;
        const weights = Array.from({ length: whole }, () => 1);
        if (fraction > 0.001) {
          weights.push(fraction);
        }
        let cumulative = 0;
        return positions.slice(0, weights.length).map((position, index) => {
          const slot = {
            x: position.x,
            y: position.y,
            scale: position.scale,
            weight: weights[index],
            cumulative
          };
          cumulative += weights[index];
          return slot;
        });
      }

      function slotProgress(totalUnits, slot) {
        if (slot.weight <= 0) {
          return 0;
        }
        return clamp((totalUnits - slot.cumulative) / slot.weight, 0, 1);
      }

      function generateBloomPositions(count, spreadX, spreadY, seed) {
        const positions = [];
        const total = Math.max(count, 1);
        for (let index = 0; index < total; index += 1) {
          const ratio = Math.sqrt((index + 0.55) / total);
          const angle = index * 2.3999632297 + seed * Math.PI * 2.4;
          positions.push({
            x: Math.cos(angle) * spreadX * ratio,
            y: Math.sin(angle) * spreadY * ratio * 0.84 + spreadY * 0.06,
            scale: 0.82 + (1 - ratio) * 0.42
          });
        }
        return shufflePositions(positions, seed);
      }

      function shufflePositions(list, seed) {
        const rng = createRng(Math.floor(seed * 1000000) + 17);
        const output = [...list];
        for (let index = output.length - 1; index > 0; index -= 1) {
          const swapIndex = Math.floor(rng() * (index + 1));
          const temp = output[index];
          output[index] = output[swapIndex];
          output[swapIndex] = temp;
        }
        return output;
      }

      function createRng(seed) {
        let value = seed >>> 0;
        return () => {
          value = (value * 1664525 + 1013904223) >>> 0;
          return value / 4294967296;
        };
      }

      function getStageName(rate) {
        if (rate <= 0) return "小小种子";
        if (rate <= 10) return "长出嫩芽";
        if (rate <= 20) return "苗杆挺立";
        if (rate <= 30) return "抽枝展叶";
        if (rate <= 40) return "枝丫茁壮";
        if (rate <= 50) return "枝叶渐丰";
        if (rate <= 60) return "绿树成荫";
        if (rate <= 70) return "含苞待放";
        if (rate <= 80) return "花朵初绽";
        if (rate <= 90) return "繁花盛放";
        if (rate < 100) return "花落结果";
        return "硕果累累";
      }

      function smoothStep(start, end, value) {
        if (start === end) {
          return value >= end ? 1 : 0;
        }
        const x = clamp((value - start) / (end - start), 0, 1);
        return x * x * (3 - 2 * x);
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function formatCurrency(value) {
        return Math.round(value).toLocaleString("zh-CN");
      }

      function formatDecimal(value) {
        return Number(value).toLocaleString("zh-CN", {
          minimumFractionDigits: 0,
          maximumFractionDigits: 2
        });
      }

      function formatRate(value) {
        return `${value.toLocaleString("zh-CN", {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2
        })}%`;
      }

      function formatDays(durationMs) {
        return String(Math.floor(Math.max(0, durationMs) / 86400000));
      }

      function formatReportDate(dateText) {
        const date = new Date(`${dateText}T00:00:00`);
        if (Number.isNaN(date.getTime())) {
          return "2026年7月3日 星期五";
        }
        return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日 ${weekdayMap[date.getDay()]}`;
      }

      function formatDateTime(isoText) {
        const date = new Date(isoText);
        if (Number.isNaN(date.getTime())) {
          return "--";
        }
        const pad = (value) => String(value).padStart(2, "0");
        return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
      }

      function clone(value) {
        return JSON.parse(JSON.stringify(value));
      }

      function seededNumber(text) {
        const hash = Math.abs(hashCode(text));
        return (hash % 10000) / 10000;
      }

      function hashCode(text) {
        let hash = 0;
        for (let index = 0; index < text.length; index += 1) {
          hash = ((hash << 5) - hash) + text.charCodeAt(index);
          hash |= 0;
        }
        return hash;
      }

      function hexToRgba(hex, alpha) {
        const normalized = hex.replace("#", "");
        const value = normalized.length === 3
          ? normalized.split("").map((part) => part + part).join("")
          : normalized;
        const number = parseInt(value, 16);
        const red = (number >> 16) & 255;
        const green = (number >> 8) & 255;
        const blue = number & 255;
        return `rgba(${red}, ${green}, ${blue}, ${alpha})`;
      }

      function mixColor(colorA, colorB, ratio) {
        const start = parseColor(colorA);
        const end = parseColor(colorB);
        const progress = clamp(ratio, 0, 1);
        const red = Math.round(start.r + (end.r - start.r) * progress);
        const green = Math.round(start.g + (end.g - start.g) * progress);
        const blue = Math.round(start.b + (end.b - start.b) * progress);
        return `rgb(${red}, ${green}, ${blue})`;
      }

      function parseColor(hex) {
        const normalized = hex.replace("#", "");
        const value = normalized.length === 3
          ? normalized.split("").map((part) => part + part).join("")
          : normalized;
        const number = parseInt(value, 16);
        return {
          r: (number >> 16) & 255,
          g: (number >> 8) & 255,
          b: number & 255
        };
      }
    })();
  </script>
